# WiDB 配置文件
#
# 本文件由 widb-server 首次启动时自动生成（若当前目录不存在 widb.yaml）。
# 编辑后重启服务即可生效。所有时间间隔使用 Go duration 字符串，如 5s、1m、2h。
# 命令行参数（如 -tcp）会覆盖本文件中的同名配置。

# 服务监听地址
server:
  # TCP 自定义二进制协议监听地址（高性能接入，widb-cli 默认使用）
  tcp_addr: "0.0.0.0:9000"
  # HTTP REST API 监听地址（/query、/write、/health、/metrics）
  http_addr: "0.0.0.0:8080"
  # PostgreSQL wire 协议监听地址（JDBC/psql 接入，留空则不启用）
  pg_addr: "0.0.0.0:5432"

# 存储引擎配置
storage:
  # 数据目录，存放 WAL、Segment、Catalog 等文件
  data_dir: "./data"
  # MemTable 最大字节数，超过后触发刷盘生成 Segment
  max_memtable_size: 67108864

# 后台调度器配置（自动刷盘、Compaction、WAL 清理）
scheduler:
  # 是否启用后台调度器
  enabled: true
  # 自动刷盘检查间隔（0 表示禁用）
  flush_interval: 5s
  # 自动 Compaction 检查间隔（0 表示禁用）
  compact_interval: 10s
  # WAL 清理检查间隔（0 表示禁用）
  wal_clean_interval: 30s
  # WAL 文件大小超过此阈值（字节）时清理旧文件
  wal_clean_threshold: 67108864
